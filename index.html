<html lang="ja">
  <head>

    "react/": "https://aistudiocdn.com/react@^19.1.1/",

    "vite": "https://aistudiocdn.com/vite@^7.1.3",

<style>
:root {
  --bg-deep: #000000; 
  --stellar-cyan: #22d3ee;
  --neon-glow: 0 0 10px rgba(34, 211, 238, 0.8), 0 0 20px rgba(34, 211, 238, 0.4);
}

body {
  margin: 0; padding: 0; overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--bg-deep);
  color: #e2e8f0;
}

#root { position: relative; z-index: 10; height: 100vh; }

/* --- Space HUD & Hologram Styles --- */
.hud-panel {
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
}

.text-hologram {
  font-family: 'Cinzel Decorative', serif;
  background: linear-gradient(to bottom, #ffffff 30%, #f1f5f9 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5));
}

.btn-tactical {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #fff;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.btn-tactical:hover {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.5);
  box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
  letter-spacing: 0.1em;
}

.corner-accent {
  position: absolute; width: 12px; height: 12px; border-color: rgba(255, 255, 255, 0.3); border-style: solid;
}
.lt { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.rt { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
.lb { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
.rb { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

@keyframes math-fade-in {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-math-fade-in {
  animation: math-fade-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes level-up-reveal {
  0% { transform: scale(0.8) translateY(40px); opacity: 0; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}
.animate-level-up-reveal {
  animation: level-up-reveal 0.6s cubic-bezier(0.17, 0.89, 0.32, 1.49) forwards;
}

@keyframes pulse-slow {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.03); opacity: 0.9; }
}
.animate-pulse-slow {
  animation: pulse-slow 4s infinite ease-in-out;
}

.card-container { perspective: 1000px; width: 14rem; height: 18rem; }
.card-inner {
  position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d; cursor: pointer;
}
.card-inner.is-flipped { transform: rotateY(180deg); }
.card-front, .card-back {
  position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
}
.card-front { transform: rotateY(180deg); }

@keyframes screen-shake {
  0%, 100% { transform: translate(0, 0); }
  10%, 30%, 50%, 70%, 90% { transform: translate(-2px, 1px); }
  20%, 40%, 60%, 80% { transform: translate(2px, -1px); }
}
.vfx-shake { animation: screen-shake 0.4s both; }

@keyframes success-burst {
  0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
  100% { box-shadow: 0 0 50px 100px rgba(255, 255, 255, 0); }
}
.vfx-success { animation: success-burst 0.5s ease-out; }

</style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
